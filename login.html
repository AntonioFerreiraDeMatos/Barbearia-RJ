<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin - Barbearia RJ</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f9f9f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #222;
    }

    .login-container {
      background: #fff;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .login-container h1 {
      font-family: 'Playfair Display', serif;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .login-container p {
      color: #777;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .input-wrapper {
      position: relative;
      margin-bottom: 20px;
    }

    .input-wrapper i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      font-size: 14px;
    }

    .input-wrapper input {
      width: 100%;
      padding: 12px 15px 12px 48px;
      border-radius: 50px;
      border: 1px solid #eee;
      background: #fdfdfd;
      outline: none;
      font-family: 'Poppins', sans-serif;
      transition: 0.3s;
    }

    .input-wrapper input:focus {
      border-color: #000;
      background: #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      border-radius: 50px;
      border: none;
      background: #000;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-login:hover {
      background: #222;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .back-home {
      display: inline-block;
      margin-top: 25px;
      text-decoration: none;
      color: #888;
      font-size: 13px;
      transition: 0.3s;
    }

    .back-home:hover {
      color: #000;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <h1>Login Admin</h1>
    <p>Área restrita para gerenciamento</p>

    <div class="input-wrapper">
      <i class="fas fa-user"></i>
      <input type="text" id="usuario" placeholder="Usuário">
    </div>

    <div class="input-wrapper">
      <i class="fas fa-lock"></i>
      <input type="password" id="senha" placeholder="Senha">
    </div>

    <button class="btn-login" onclick="login()">Entrar</button>

    <a href="index.html" class="back-home">
      <i class="fas fa-arrow-left"></i> Voltar para o site
    </a>
  </div>

  <script>
    function login() {
      const usuario = document.getElementById("usuario").value;
      const senha = document.getElementById("senha").value;

      // Validação simples antes de enviar
      if (!usuario || !senha) {
        alert("Por favor, preencha todos os campos.");
        return;
      }

      fetch("http://localhost:3000/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ usuario, senha })
      })
      .then(res => {
        if (!res.ok) {
          // Se o servidor retornar erro (ex: 401), lança para o catch
          throw new Error("Usuário ou senha inválidos");
        }
        return res.json();
      })
      .then(data => {
        // Se o seu backend retornar um token, salvamos aqui
        if (data.token) {
          localStorage.setItem("token", data.token);
        }
        
        alert("Login realizado com sucesso! 🔥");
        window.location.href = "admin.html"; 
      })
      .catch(err => {
        console.error(err);
        alert(err.message || "Erro ao conectar com o servidor.");
      });
    }
  </script>

</body>
</html>
